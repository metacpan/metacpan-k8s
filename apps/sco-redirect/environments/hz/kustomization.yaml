apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: apps--sco-redirect
resources:
  - namespace.yaml
  - ingress.yaml
  - ../../base/
images:
  - name: metacpan/sco-redirect
    newTag: sha-145862caeef7dace9d8fe6b732e6d04e32b08368
patches:
  - target:
      kind: Deployment
      name: sco-redirect
    patch: |
      - op: add
        path: /spec/template/spec/nodeSelector

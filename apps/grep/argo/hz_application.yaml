apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hz--grep
  namespace: argocd
spec:
  project: grep
  source:
    repoURL: https://github.com/metacpan/metacpan-k8s
    targetRevision: cloudfleet
    path: apps/grep/environments/hz
  destination:
    server: https://kubernetes.default.svc
    namespace: apps--grep
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: apps--grep
resources:
  - namespace.yaml
  - ingress.yaml
  - service-staging.yaml
  - ingress-staging.yaml
  - ../../base/
images:
  - name: metacpan/metacpan-grep-front-end
    newTag: sha-a5f6e6a852fd52203da5345c279b39a5b6ec9ae0
patches:
  - target:
      kind: PersistentVolumeClaim
      name: gitrepo-pv
    patch: |
      - op: replace
        path: /spec/storageClassName
        value: hcloud-volumes
  - target:
      kind: Deployment
      name: grep
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/command
        value: ["sleep", "infinity"]
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "64Mi"
          limits:
            memory: "64Mi"
      - op: add
        path: /spec/template/spec/containers/-
        value:
          name: web-staging
          image: docker.io/metacpan/metacpan-grep-front-end:b26831ac598cd143a3e97f1dd6a7755c08f98b39
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          command: ["/bin/bash", "-e", "-c"]
          args:
            - |
              cd /metacpan-grep-front-end
              sed -i 's/plackup -p 3000/plackup -p 3001/' docker-entrypoint.sh
              ./docker-entrypoint.sh serve
          envFrom:
            - configMapRef:
                name: grep
          resources:
            requests:
              memory: "6Gi"
            limits:
              memory: "6Gi"
          volumeMounts:
            - name: gitrepo
              mountPath: /shared
              readOnly: false

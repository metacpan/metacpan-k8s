apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: apps--grep
resources:
  - namespace.yaml
  - ingress.yaml
  - service-staging.yaml
  - ingress-staging.yaml
  - ../../base/
images:
  - name: metacpan/metacpan-grep-front-end
    newTag: sha-a5f6e6a852fd52203da5345c279b39a5b6ec9ae0
patches:
  - target:
      kind: PersistentVolumeClaim
      name: gitrepo-pv
    patch: |
      - op: replace
        path: /spec/storageClassName
        value: hcloud-volumes
  - target:
      kind: Deployment
      name: grep
    patch: |
      - op: add
        path: /spec/template/spec/containers/-
        value:
          name: web-staging
          image: metacpan/metacpan-grep-front-end:sha-b26831ac598cd143a3e97f1dd6a7755c08f98b39
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          command: ["/bin/bash", "-e", "-c"]
          args:
            - |
              echo "Starting staging grep frontend on port 3001..."
              cd /metacpan-grep-front-end
              plackup -p 3001 ${PLACKUP_ARGS} bin/app.psgi
          envFrom:
            - configMapRef:
                name: grep
          resources:
            requests:
              memory: "10Gi"
            limits:
              memory: "10Gi"
          volumeMounts:
            - name: gitrepo
              mountPath: /shared
              readOnly: false

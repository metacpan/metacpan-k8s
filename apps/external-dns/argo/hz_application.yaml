apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hz--external-dns
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://kubernetes-sigs.github.io/external-dns
      chart: external-dns
      targetRevision: "*"
      helm:
        valueFiles:
          - $values/apps/external-dns/environments/hz/values.yaml
    - repoURL: https://github.com/metacpan/metacpan-k8s
      targetRevision: cloudfleet
      ref: values
    - repoURL: https://github.com/metacpan/metacpan-k8s
      targetRevision: cloudfleet
      path: apps/external-dns/environments/hz/resources
  destination:
    server: https://kubernetes.default.svc
    namespace: apps--external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

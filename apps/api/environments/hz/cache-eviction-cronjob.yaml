apiVersion: v1
kind: ServiceAccount
metadata:
  name: cache-eviction
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cache-eviction
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cache-eviction
subjects:
  - kind: ServiceAccount
    name: cache-eviction
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: cache-eviction
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cache-eviction
spec:
  schedule: "15 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 10
      activeDeadlineSeconds: 1800
      template:
        spec:
          serviceAccountName: cache-eviction
          restartPolicy: OnFailure
          containers:
            - name: cache-eviction
              image: bitnami/kubectl:latest
              command:
                - kubectl
                - exec
                - -n
                - apps--mc-api
                - deployment/api
                - --
                - find
                - /mnt/scratch_disk
                - -not
                - -name
                - lost+found
                - -atime
                - "+1"
                - -delete

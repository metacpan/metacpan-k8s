apiVersion: batch/v1
kind: CronJob
metadata:
  name: api-release
spec:
  schedule: "5 0 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 10
      activeDeadlineSeconds: 3600
      template:
        spec:
          serviceAccountName: api-cronjob
          restartPolicy: OnFailure
          containers:
            - name: release
              image: bitnami/kubectl:latest
              command: ["/bin/sh", "/scripts/cronjob-wrapper.sh"]
              args:
                - api-release
                - /app/bin/metacpan
                - release
                - --queue
                - --skip
                - --age
                - "48"
                - --detect_backpan
                - --latest
                - /home/metacpan/CPAN/authors/id/
              volumeMounts:
                - name: cronjob-wrapper
                  mountPath: /scripts
          volumes:
            - name: cronjob-wrapper
              configMap:
                name: cronjob-wrapper
                defaultMode: 0755

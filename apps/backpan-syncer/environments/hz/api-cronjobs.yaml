apiVersion: batch/v1
kind: CronJob
metadata:
  name: api-scratch-cleanup
spec:
  schedule: "45 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 10
      activeDeadlineSeconds: 1800
      template:
        spec:
          serviceAccountName: api-cronjob
          restartPolicy: OnFailure
          containers:
            - name: scratch-cleanup
              image: bitnami/kubectl:latest
              command: ["/bin/sh", "/scripts/cronjob-wrapper.sh"]
              args:
                - api-scratch-cleanup
                - find
                - /mnt/scratch_disk
                - -mindepth
                - "1"
                - -not
                - -name
                - lost+found
                - -mmin
                - "+45"
                - -delete
              volumeMounts:
                - name: cronjob-wrapper
                  mountPath: /scripts
          volumes:
            - name: cronjob-wrapper
              configMap:
                name: cronjob-wrapper
                defaultMode: 0755

apiVersion: batch/v1
kind: CronJob
metadata:
  name: api-package
spec:
  schedule: "*/10 1-23 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 10
      activeDeadlineSeconds: 1800
      template:
        spec:
          serviceAccountName: api-cronjob
          restartPolicy: OnFailure
          containers:
            - name: package
              image: bitnami/kubectl:latest
              command: ["/bin/sh", "/scripts/cronjob-wrapper.sh"]
              args:
                - api-package
                - /app/bin/metacpan
                - package
              volumeMounts:
                - name: cronjob-wrapper
                  mountPath: /scripts
          volumes:
            - name: cronjob-wrapper
              configMap:
                name: cronjob-wrapper
                defaultMode: 0755
---

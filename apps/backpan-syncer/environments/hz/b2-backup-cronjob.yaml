apiVersion: batch/v1
kind: CronJob
metadata:
  name: backpan-b2-backup
spec:
  schedule: "0 3 1 * *"  # 3am UTC, 1st of each month
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: backpan-syncer
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: restic
              image: restic/restic:0.17
              command: ["/bin/sh", "-c"]
              args:
                - |
                  restic snapshots || restic init
                  restic backup /mnt/backpan
                  restic forget --keep-monthly 3 --prune
              env:
                - name: RESTIC_REPOSITORY
                  value: s3:https://s3.eu-central-003.backblazeb2.com/mc-backpan-restic
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: restic-b2-backup
                      key: restic-password
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: restic-b2-backup
                      key: b2-account-id
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: restic-b2-backup
                      key: b2-account-key
              volumeMounts:
                - name: backpan
                  mountPath: /mnt/backpan
                  readOnly: true
          volumes:
            - name: backpan
              persistentVolumeClaim:
                claimName: backpan-fsn1
                readOnly: true

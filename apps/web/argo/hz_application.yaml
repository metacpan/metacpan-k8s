apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hz--web
  namespace: argocd
spec:
  project: web
  source:
    repoURL: https://github.com/metacpan/metacpan-k8s
    targetRevision: cloudfleet
    path: apps/web/environments/hz
  destination:
    server: https://kubernetes.default.svc
    namespace: apps--web
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

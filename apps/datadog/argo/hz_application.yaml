apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hz--datadog
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://helm.datadoghq.com
      chart: datadog
      targetRevision: "*"
      helm:
        valueFiles:
          - $values/apps/datadog/environments/hz/values.yaml
    - repoURL: https://github.com/metacpan/metacpan-k8s
      targetRevision: cloudfleet
      ref: values
    - repoURL: https://github.com/metacpan/metacpan-k8s
      targetRevision: cloudfleet
      path: apps/datadog/environments/hz/resources
  destination:
    server: https://kubernetes.default.svc
    namespace: apps--datadog
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
